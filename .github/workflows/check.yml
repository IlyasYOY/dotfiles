name: Check

on:
  pull_request:
  push:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Lua
        uses: leafo/gh-actions-lua@v12
        with:
          luaVersion: "5.4"

      - name: Set up LuaRocks
        uses: leafo/gh-actions-luarocks@v6

      - name: Install check tools
        env:
          STYLUA_VERSION: v2.4.0
        run: |
          sudo apt-get update
          sudo apt-get install --yes shellcheck unzip
          luarocks install luacheck
          curl -fsSL -o stylua.zip "https://github.com/JohnnyMorganz/StyLua/releases/download/${STYLUA_VERSION}/stylua-linux-x86_64.zip"
          unzip -q stylua.zip -d stylua-bin
          sudo install stylua-bin/stylua /usr/local/bin/stylua

      - name: Run checks
        run: make check
