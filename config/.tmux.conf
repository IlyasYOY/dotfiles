set -g mouse on

set-option -g extended-keys on
set -g extended-keys-format csi-u

set-window-option -g mode-keys vi

bind-key l last-window

bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel

# makes tmux numbering start from 1
set -g base-index 1 
setw -g pane-base-index 1 

# colors
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set-option -g status-style bg='#191919',fg='#dadada'
set-window-option -g window-status-current-style bg='#ffaf00',fg='#191919'
set-window-option -g monitor-bell on
set-option -g bell-action any
set-option -g visual-bell off
set-hook -g alert-bell ''
set-window-option -g window-status-bell-style bg='#ff005f',fg='#000000',bold
set-window-option -g monitor-activity on
set-option -g activity-action none
set-option -g visual-activity on
set-window-option -g window-status-activity-style bg='#303030',fg='#dadada',bold
set -g pane-border-lines heavy
set -g pane-active-border-style fg='#ffaf00'
set -g pane-border-style fg='#444444'
set -g pane-border-status top
set -g pane-border-format ""

# new panes are open in pwd
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

set -s command-alias[100] ai-left='split-window -hb -c "#{pane_current_path}" "if command -v codex >/dev/null 2>&1; then exec codex; else exec opencode; fi"'
set -s command-alias[101] ai-right='split-window -h -c "#{pane_current_path}" "if command -v codex >/dev/null 2>&1; then exec codex; else exec opencode; fi"'
set -s command-alias[102] ai-top='split-window -vb -c "#{pane_current_path}" "if command -v codex >/dev/null 2>&1; then exec codex; else exec opencode; fi"'
set -s command-alias[103] ai-bottom='split-window -v -c "#{pane_current_path}" "if command -v codex >/dev/null 2>&1; then exec codex; else exec opencode; fi"'
set -s command-alias[104] ai-resume-left='split-window -hb -c "#{pane_current_path}" "if command -v codex >/dev/null 2>&1; then exec codex resume; else exec opencode --continue; fi"'
set -s command-alias[105] ai-resume-right='split-window -h -c "#{pane_current_path}" "if command -v codex >/dev/null 2>&1; then exec codex resume; else exec opencode --continue; fi"'
set -s command-alias[106] ai-resume-top='split-window -vb -c "#{pane_current_path}" "if command -v codex >/dev/null 2>&1; then exec codex resume; else exec opencode --continue; fi"'
set -s command-alias[107] ai-resume-bottom='split-window -v -c "#{pane_current_path}" "if command -v codex >/dev/null 2>&1; then exec codex resume; else exec opencode --continue; fi"'
set -s command-alias[108] codex-left='split-window -hb -c "#{pane_current_path}" codex'
set -s command-alias[109] codex-right='split-window -h -c "#{pane_current_path}" codex'
set -s command-alias[110] codex-top='split-window -vb -c "#{pane_current_path}" codex'
set -s command-alias[111] codex-bottom='split-window -v -c "#{pane_current_path}" codex'
set -s command-alias[112] codex-resume-left='split-window -hb -c "#{pane_current_path}" "codex resume"'
set -s command-alias[113] codex-resume-right='split-window -h -c "#{pane_current_path}" "codex resume"'
set -s command-alias[114] codex-resume-top='split-window -vb -c "#{pane_current_path}" "codex resume"'
set -s command-alias[115] codex-resume-bottom='split-window -v -c "#{pane_current_path}" "codex resume"'
set -s command-alias[116] opencode-left='split-window -hb -c "#{pane_current_path}" opencode'
set -s command-alias[117] opencode-right='split-window -h -c "#{pane_current_path}" opencode'
set -s command-alias[118] opencode-top='split-window -vb -c "#{pane_current_path}" opencode'
set -s command-alias[119] opencode-bottom='split-window -v -c "#{pane_current_path}" opencode'
set -s command-alias[120] opencode-resume-left='split-window -hb -c "#{pane_current_path}" "opencode --continue"'
set -s command-alias[121] opencode-resume-right='split-window -h -c "#{pane_current_path}" "opencode --continue"'
set -s command-alias[122] opencode-resume-top='split-window -vb -c "#{pane_current_path}" "opencode --continue"'
set -s command-alias[123] opencode-resume-bottom='split-window -v -c "#{pane_current_path}" "opencode --continue"'
bind-key a ai-right
bind-key A ai-resume-right

set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'thewtex/tmux-mem-cpu-load'
set -g @plugin 'tmux-plugins/tmux-resurrect'

set -g @resurrect-strategy-nvim 'session'

# initialize TMUX plugin manager 
# (keep this line at the very bottom of tmux.conf)
# prefix + I (capital i, as in Install) to fetch the plugin.
run '~/.tmux/plugins/tpm/tpm'

set -g status-left-length 50
set -g status-right-length 120
set -g status-right '#(${ILYASYOY_DOTFILES_DIR:-$HOME/Projects/IlyasYOY/dotfiles}/bin/tmux-keyboard-layout) | #(pmset -g batt | grep "InternalBattery" | awk "{print \$3}" | sed "s/;//") | #($TMUX_PLUGIN_MANAGER_PATH/tmux-mem-cpu-load/tmux-mem-cpu-load -g 0 -t 0 -a 0 --interval 2)'
